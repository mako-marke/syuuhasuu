<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ソルフェジオ周波数 魂の共鳴診断</title>
<style>
/* ========================================
   ROOT VARIABLES & RESET
======================================== */
:root {
  --gold: #C9A84C;
  --gold-light: #F0D080;
  --gold-dark: #8B6914;
  --deep-navy: #0D0D2B;
  --navy: #1A1A40;
  --navy-light: #252560;
  --purple: #3D1F6B;
  --purple-light: #6A3CA8;
  --teal: #0D7377;
  --text-primary: #F5EDD5;
  --text-muted: #A899C5;
  --card-bg: rgba(26, 26, 64, 0.85);
  --card-border: rgba(201, 168, 76, 0.3);
  --selected-bg: rgba(201, 168, 76, 0.15);
  --selected-border: rgba(201, 168, 76, 0.9);
  --font-main: 'Hiragino Mincho ProN', 'Yu Mincho', 'MS PMincho', serif;
  --font-sub: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--deep-navy);
  color: var(--text-primary);
  font-family: var(--font-main);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* 背景グラデーション */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(61,31,107,0.6) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(13,115,119,0.2) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(13,13,43,1) 0%, transparent 80%);
  pointer-events: none;
  z-index: 0;
}

/* ========================================
   星空
======================================== */
.stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur, 3s) ease-in-out infinite;
  opacity: 0;
}
@keyframes twinkle {
  0%,100% { opacity: 0; transform: scale(1); }
  50% { opacity: var(--op, 0.8); transform: scale(1.2); }
}

/* ========================================
   音波リング（背景）
======================================== */
.sonic-ring {
  position: fixed;
  border-radius: 50%;
  border: 1px solid rgba(201, 168, 76, 0.22);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: sonicPulse 5s ease-out infinite;
  pointer-events: none;
  z-index: 0;
  width: 80px;
  height: 80px;
}
.sonic-ring:nth-child(2) { animation-delay: 1.6s; }
.sonic-ring:nth-child(3) { animation-delay: 3.2s; }

@keyframes sonicPulse {
  0%   { width: 80px;  height: 80px;  opacity: 0.6; }
  100% { width: 900px; height: 900px; opacity: 0; }
}

/* ========================================
   LAYOUT
======================================== */
#app {
  position: relative;
  z-index: 1;
  max-width: 680px;
  margin: 0 auto;
  padding: 0 20px 80px;
}

/* ========================================
   HEADER
======================================== */
.app-header {
  text-align: center;
  padding: 40px 0 20px;
}

.app-header .subtitle {
  font-family: var(--font-sub);
  font-size: 12px;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 14px;
  opacity: 0.9;
}

.app-header h1 {
  font-size: clamp(24px, 6vw, 36px);
  font-weight: 600;
  line-height: 1.5;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 16px 0;
}
.ornament-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
  max-width: 120px;
}
.ornament-diamond {
  width: 8px; height: 8px;
  background: var(--gold);
  transform: rotate(45deg);
}

/* ========================================
   PROGRESS BAR
======================================== */
.progress-wrap {
  margin: 20px 0 30px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-sub);
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.progress-label .step-name {
  color: var(--gold);
  font-weight: 600;
}
.progress-bar {
  height: 5px;
  background: rgba(255,255,255,0.1);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(to right, var(--gold-dark), var(--gold-light));
  border-radius: 99px;
  transition: width 0.5s ease;
}

/* ========================================
   QUESTION CARD
======================================== */
.question-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 32px 28px;
  backdrop-filter: blur(10px);
  animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(30px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.question-number {
  font-family: var(--font-sub);
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
  letter-spacing: 2px;
}

.question-text {
  font-size: clamp(18px, 4vw, 24px);
  line-height: 1.7;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 10px;
}

.question-hint {
  font-family: var(--font-sub);
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.7;
  margin-bottom: 28px;
  padding: 10px 14px;
  background: rgba(255,255,255,0.03);
  border-left: 2px solid var(--gold-dark);
  border-radius: 0 8px 8px 0;
}

/* ========================================
   CHOICE BUTTONS（縦1列）
======================================== */
.choices {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.choice-btn {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 22px 20px;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(201,168,76,0.2);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.25s ease;
  text-align: left;
  color: var(--text-primary);
  font-family: var(--font-main);
  position: relative;
  overflow: hidden;
  min-height: 88px;
  width: 100%;
}

.choice-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(201,168,76,0.1), transparent);
  opacity: 0;
  transition: opacity 0.25s;
}

.choice-btn:hover {
  border-color: rgba(201,168,76,0.6);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,168,76,0.3);
}
.choice-btn:hover::before { opacity: 1; }

.choice-btn.selected {
  border-color: var(--selected-border);
  background: var(--selected-bg);
  box-shadow: 0 0 20px rgba(201,168,76,0.2), 0 0 0 1px rgba(201,168,76,0.5);
}
.choice-btn.selected::before { opacity: 1; }

.choice-emoji {
  font-size: 40px;
  flex-shrink: 0;
  width: 56px;
  text-align: center;
  line-height: 1;
}

.choice-content {
  flex: 1;
}

.choice-label {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.5;
  color: var(--text-primary);
}

.choice-desc {
  font-family: var(--font-sub);
  font-size: 13px;
  color: var(--gold);
  opacity: 0.85;
  line-height: 1.4;
  margin-top: 4px;
}

.choice-selected-mark {
  position: absolute;
  top: 12px;
  right: 14px;
  width: 24px; height: 24px;
  background: var(--gold);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
  font-size: 13px;
  color: var(--deep-navy);
  font-weight: bold;
}
.choice-btn.selected .choice-selected-mark { opacity: 1; }

/* ========================================
   NAVIGATION
======================================== */
.nav-btns {
  display: flex;
  gap: 12px;
  margin-top: 28px;
}

.btn-next {
  flex: 1;
  padding: 18px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
  border: none;
  border-radius: 12px;
  color: var(--deep-navy);
  font-family: var(--font-sub);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.25s;
  opacity: 0.4;
  pointer-events: none;
  position: relative;
  overflow: hidden;
}
.btn-next.active {
  opacity: 1;
  pointer-events: auto;
}
.btn-next.active:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(201,168,76,0.4);
}
.btn-next::after {
  content: ' ▶';
  font-size: 12px;
}

.btn-back {
  padding: 18px 22px;
  background: transparent;
  border: 1.5px solid rgba(201,168,76,0.3);
  border-radius: 12px;
  color: var(--text-muted);
  font-family: var(--font-sub);
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-back:hover {
  border-color: rgba(201,168,76,0.6);
  color: var(--text-primary);
}

/* ========================================
   START SCREEN
======================================== */
.start-screen {
  text-align: center;
  padding: 20px 0 40px;
  animation: fadeIn 0.8s ease both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.start-icon {
  font-size: 72px;
  margin-bottom: 20px;
  display: block;
  animation: floatIcon 4s ease-in-out infinite;
}
@keyframes floatIcon {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}

.start-screen h2 {
  font-size: clamp(20px, 4.5vw, 28px);
  background: linear-gradient(135deg, var(--gold-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 16px;
  font-weight: 600;
  line-height: 1.5;
}

.start-screen .start-desc {
  font-family: var(--font-sub);
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.9;
  max-width: 480px;
  margin: 0 auto 32px;
}

.start-info {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 99px;
  padding: 8px 20px;
  font-family: var(--font-sub);
  font-size: 13px;
  color: var(--gold);
  margin-bottom: 32px;
}

.btn-start {
  display: block;
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  padding: 20px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
  border: none;
  border-radius: 14px;
  color: var(--deep-navy);
  font-family: var(--font-sub);
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.3s;
  animation: glowPulse 2.5s ease-in-out infinite;
}
.btn-start:hover {
  transform: translateY(-3px) scale(1.02);
}
@keyframes glowPulse {
  0%,100% { box-shadow: 0 0 20px rgba(201,168,76,0.4); }
  50%      { box-shadow: 0 0 50px rgba(201,168,76,0.7), 0 0 100px rgba(201,168,76,0.3); }
}

/* ========================================
   LOADING SCREEN（イコライザー）
======================================== */
.loading-screen {
  text-align: center;
  padding: 80px 20px;
  animation: fadeIn 0.5s ease both;
}

.eq-bars {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 8px;
  height: 80px;
  margin: 0 auto 36px;
  width: 80px;
}

.eq-bar {
  width: 10px;
  border-radius: 5px;
  background: linear-gradient(to top, var(--gold-dark), var(--gold-light));
  animation: eqBounce var(--dur, 0.8s) ease-in-out infinite alternate;
}

@keyframes eqBounce {
  0%   { height: 12px; }
  100% { height: 64px; }
}

.loading-text {
  font-size: 18px;
  color: var(--gold);
  margin-bottom: 12px;
  font-family: var(--font-main);
  animation: blink 1.8s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

.loading-subtext {
  font-family: var(--font-sub);
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.9;
}

/* ========================================
   RESULT SCREEN
======================================== */
.result-screen {
  animation: cardIn 0.7s cubic-bezier(0.34,1.2,0.64,1) both;
}

.result-header {
  text-align: center;
  padding: 32px 0 28px;
}
.result-header .result-greeting {
  font-family: var(--font-sub);
  font-size: 13px;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 12px;
  opacity: 0.9;
}

.hz-display {
  font-size: clamp(52px, 14vw, 80px);
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 8px;
  font-family: var(--font-sub);
  letter-spacing: -1px;
}

.freq-name {
  font-size: clamp(18px, 4vw, 24px);
  color: var(--text-primary);
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: 2px;
}

.luck-type {
  font-family: var(--font-sub);
  font-size: 14px;
  color: var(--gold);
  letter-spacing: 2px;
  opacity: 0.9;
}

.result-card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 20px;
  padding: 28px;
  margin-bottom: 18px;
  backdrop-filter: blur(10px);
  animation: cardIn 0.5s ease both;
}

.result-section-title {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(201,168,76,0.2);
}
.result-section-title .icon {
  font-size: 22px;
}

.result-message {
  font-size: 15px;
  line-height: 2.1;
  color: var(--text-primary);
  font-family: var(--font-main);
  white-space: pre-line;
}

.result-highlight {
  background: rgba(201,168,76,0.1);
  border-left: 3px solid var(--gold);
  padding: 14px 18px;
  border-radius: 0 12px 12px 0;
  margin: 14px 0;
  font-size: 15px;
  line-height: 1.9;
  color: var(--text-primary);
}

.catchcopy {
  font-size: 16px;
  font-weight: 600;
  color: var(--gold-light);
  text-align: center;
  padding: 16px;
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 12px;
  background: rgba(201,168,76,0.06);
  margin-top: 16px;
  line-height: 1.6;
  letter-spacing: 1px;
}

/* 運気メーター */
.fortune-meter {
  margin: 14px 0;
}
.fortune-meter-label {
  display: flex;
  justify-content: space-between;
  font-family: var(--font-sub);
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 7px;
}
.fortune-meter-bar {
  height: 9px;
  background: rgba(255,255,255,0.08);
  border-radius: 99px;
  overflow: hidden;
}
.fortune-meter-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(to right, var(--gold-dark), var(--gold-light));
  animation: meterIn 1.5s ease-out both 0.5s;
  transform-origin: left;
}
@keyframes meterIn { from { width: 0 !important; } }

/* 受け取り方法 */
.how-to-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.how-to-item:last-child { border-bottom: none; }
.how-to-icon {
  font-size: 26px;
  flex-shrink: 0;
  margin-top: 2px;
}
.how-to-text {
  font-family: var(--font-sub);
  font-size: 15px;
  line-height: 1.8;
  color: var(--text-primary);
}
.how-to-text strong {
  color: var(--gold-light);
  display: block;
  margin-bottom: 3px;
}

/* CTA */
.cta-section {
  background: linear-gradient(135deg, rgba(61,31,107,0.6), rgba(26,26,64,0.8));
  border: 1px solid rgba(201,168,76,0.4);
  border-radius: 20px;
  padding: 36px 24px;
  text-align: center;
  margin-top: 20px;
}
.cta-section .cta-icon {
  font-size: 52px;
  margin-bottom: 16px;
  display: block;
}
.cta-section h3 {
  font-size: 18px;
  color: var(--gold-light);
  margin-bottom: 14px;
  font-weight: 600;
  line-height: 1.6;
}
.cta-section p {
  font-family: var(--font-sub);
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.9;
  margin-bottom: 24px;
}
.btn-cta {
  display: block;
  width: 100%;
  padding: 20px;
  background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-light));
  border: none;
  border-radius: 12px;
  color: var(--deep-navy);
  font-family: var(--font-sub);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  text-decoration: none;
  animation: glowPulse 2.5s ease-in-out infinite;
  transition: all 0.3s;
}
.btn-cta:hover {
  transform: translateY(-3px) scale(1.02);
}
.btn-cta-sub {
  font-family: var(--font-sub);
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 12px;
  opacity: 0.8;
}

/* retry */
.btn-retry {
  display: block;
  width: 100%;
  margin-top: 14px;
  padding: 14px;
  background: transparent;
  border: 1.5px solid rgba(201,168,76,0.3);
  border-radius: 12px;
  color: var(--text-muted);
  font-family: var(--font-sub);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-retry:hover {
  border-color: rgba(201,168,76,0.6);
  color: var(--text-primary);
}

/* ========================================
   UTILITY
======================================== */
.hidden { display: none !important; }

/* ========================================
   RESPONSIVE
======================================== */
@media (max-width: 480px) {
  .choice-btn { padding: 18px 16px; min-height: 84px; }
  .choice-emoji { font-size: 34px; width: 48px; }
  .choice-label { font-size: 15px; }
  .question-card { padding: 24px 18px; }
  .result-card { padding: 22px 16px; }
}
@media (max-width: 375px) {
  .choice-label { font-size: 14px; }
  .question-text { font-size: 17px; }
}

/* スクロールバー */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--deep-navy); }
::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 99px; }
</style>
</head>
<body>

<!-- 星空 -->
<div class="stars" id="stars"></div>

<!-- 音波リング -->
<div class="sonic-ring"></div>
<div class="sonic-ring"></div>
<div class="sonic-ring"></div>

<div id="app">
  <!-- ヘッダー -->
  <header class="app-header">
    <div class="subtitle">◆ Solfeggio Frequency ◆</div>
    <h1>ソルフェジオ周波数<br>魂の共鳴診断</h1>
    <div class="ornament">
      <div class="ornament-line"></div>
      <div class="ornament-diamond"></div>
      <div class="ornament-line"></div>
    </div>
    <p style="font-family:var(--font-sub);font-size:14px;color:var(--text-muted);line-height:1.9;text-align:center;">
      7つの質問に答えるだけで、<br>
      今のあなたの魂が共鳴する周波数がわかります。
    </p>
  </header>

  <!-- プログレスバー -->
  <div class="progress-wrap hidden" id="progressWrap">
    <div class="progress-label">
      <span class="step-name" id="stepName">診断中</span>
      <span id="stepCount">1 / 7</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 14%"></div>
    </div>
  </div>

  <!-- メインコンテンツ（JS で差し替え） -->
  <div id="mainContent"></div>
</div>

<script>
/* ========================================
   STARS GENERATOR
======================================== */
(function(){
  const container = document.getElementById('stars');
  for(let i = 0; i < 80; i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${Math.random()*4+2}s;

/* ========================================
   SCORING
======================================== */
function calcResult(answersMap) {
  const scores = { '174':0, '432':0, '528':0, '963':0, '174x528':0, '528x963':0, '528x432':0 };

  QUESTIONS.forEach(q => {
    const choiceId = answersMap[q.id];
    if (!choiceId) return;
    const choice = q.choices.find(c => c.id === choiceId);
    if (!choice) return;
    Object.entries(choice.points).forEach(([key, pts]) => {
      if (scores[key] !== undefined) scores[key] += pts;
    });
  });

  // 最高スコアのキーを返す。同点はQ7・Q6の選択を優先（タイブレーカー）
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topScore = sorted[0][1];
  const tied = sorted.filter(e => e[1] === topScore);

  if (tied.length === 1) return tied[0][0];

  // タイブレーカー：Q7とQ6の答えに付いているキー優先
  const tieKeys = tied.map(e => e[0]);
  const q6Choice = QUESTIONS[5].choices.find(c => c.id === answersMap['q6']);
  const q7Choice = QUESTIONS[6].choices.find(c => c.id === answersMap['q7']);

  for (const choice of [q7Choice, q6Choice]) {
    if (!choice) continue;
    for (const key of Object.keys(choice.points)) {
      if (tieKeys.includes(key)) return key;
    }
  }

  return tied[0][0];
}

  const content = document.getElementById('mainContent');
  const progressWrap = document.getElementById('progressWrap');

  if (appPhase === 'start') {
    progressWrap.classList.add('hidden');
    renderStart(content);
  } else if (appPhase === 'questions') {
    progressWrap.classList.remove('hidden');
    updateProgress();
    renderQuestion(content, currentIndex);
  } else if (appPhase === 'loading') {
    progressWrap.classList.add('hidden');
    renderLoading(content);
  } else if (appPhase === 'result') {
    progressWrap.classList.add('hidden');
    renderResult(content);
  }
}

function updateProgress() {
  const total = QUESTIONS.length;
  const pct = Math.round((currentIndex / total) * 100);
  document.getElementById('progressFill').style.width = Math.max(14, pct) + '%';
  document.getElementById('stepCount').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('stepName').textContent = '魂の共鳴診断';
}

          <div class="how-to-icon">🌅</div>
          <div class="how-to-text">
            <strong>おすすめの時間帯</strong>
            朝目覚めた後、または就寝前の静かな時間が最も効果的です。
          </div>
        </div>
        <div class="how-to-item">
          <div class="how-to-icon">🎵</div>
          <div class="how-to-text">
            <strong>聴き方のポイント</strong>
            イヤホンで、目を閉じて深呼吸しながら10〜15分聴くと、より深く共鳴できます。
          </div>
        </div>
      </div>

      <!-- もう一度診断する -->
      <div style="text-align:center;padding:24px 0 8px;">
        <button class="btn-retry" onclick="resetQuiz()">
          ↩ もう一度診断する
        </button>
      </div>

    </div>
  `;

  // Hzカウントアップアニメーション
  animateHz(fd.hzNumeric, 'hzDisplay', fd.hzLabel);
}

function renderMeter(label, value) {
  return `
    <div class="fortune-meter">
      <div class="fortune-meter-label">
        <span>${label}</span>
        <span style="color:var(--gold)">${value}%</span>
      </div>
      <div class="fortune-meter-bar">
        <div class="fortune-meter-fill" style="width:${value}%"></div>
      </div>
    </div>
  `;
}

/* ========================================
   ANIMATIONS
======================================== */
function animateHz(targetHz, elementId, finalLabel) {
  const el = document.getElementById(elementId);
  if (!el) return;
  let current = 100;
  const step = Math.ceil((targetHz - 100) / 40);
  const timer = setInterval(() => {
    current = Math.min(current + step, targetHz);
    el.textContent = current + 'Hz';
    if (current >= targetHz) {
      el.textContent = finalLabel || (targetHz + 'Hz');
      clearInterval(timer);
    }
  }, 50);
}

/* ========================================
   USER ACTIONS
======================================== */
function startQuiz() {
  appPhase = 'questions';
  currentIndex = 0;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectChoice(qid, value) {
  userAnswers[qid] = value;

  // 選択ボタンのビジュアル更新
  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.value === value);
  });

  // 次へボタンを活性化
  const btnNext = document.getElementById('btnNext');
  if (btnNext) btnNext.classList.add('active');
}

function goNext() {
  const q = QUESTIONS[currentIndex];
  if (!userAnswers[q.id]) return;

  currentIndex++;

  if (currentIndex >= QUESTIONS.length) {
    appPhase = 'loading';
    render();
    return;
  }

  appPhase = 'questions';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (currentIndex > 0) {
    currentIndex--;
    appPhase = 'questions';
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function resetQuiz() {
  currentIndex = 0;
  userAnswers = {};
  appPhase = 'start';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ========================================
   INIT
======================================== */
render();
</script>
</body>
